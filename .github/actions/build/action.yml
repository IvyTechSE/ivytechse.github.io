name: Build site
description: Checkout, install, lint, and build the static site
inputs:
  base-path:
    description: 'Base path for the site (e.g. /pr-preview/pr-42). Leave empty for production builds.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22'
        cache: npm
    - run: npm install
      shell: bash
    - run: npm run lint
      shell: bash
    - run: npm run build
      shell: bash
      env:
        NEXT_PUBLIC_BASE_PATH: ${{ inputs.base-path }}
