name: Build site
description: >
  Install dependencies, lint, and build the static site.
  The repository must already be checked out before calling this action
  (required when referencing local composite actions).
inputs:
  base-path:
    description: 'Base path for the site (e.g. /pr-preview/pr-42). Leave empty for production builds.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
    - run: npm install
      shell: bash
    - run: npm run lint
      shell: bash
    - run: npm run build
      shell: bash
      env:
        NEXT_PUBLIC_BASE_PATH: ${{ inputs.base-path }}
