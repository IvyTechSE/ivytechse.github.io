name: Bundle Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bundle-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 1. Build the main branch to establish a baseline
      # ------------------------------------------------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node (main)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies (main)
        run: npm ci

      - name: Build main branch
        run: npm run build
        continue-on-error: true
        id: build-main

      - name: Measure main bundle sizes
        if: steps.build-main.outcome == 'success'
        run: node scripts/bundle-size.js --output /tmp/main-sizes.json

      # ------------------------------------------------------------------
      # 2. Build the PR branch, compare, and report
      # ------------------------------------------------------------------
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: true

      - name: Setup Node (PR)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies (PR)
        run: npm ci

      - name: Build PR branch
        run: npm run build

      - name: Check bundle sizes and generate report
        id: bundle-check
        run: |
          BASELINE_FLAG=""
          if [ -f /tmp/main-sizes.json ]; then
            BASELINE_FLAG="--baseline /tmp/main-sizes.json"
          fi
          node scripts/bundle-size.js \
            $BASELINE_FLAG \
            --output /tmp/pr-sizes.json \
            --report /tmp/bundle-report.md \
            --strict
          BUNDLE_EXIT=$?
          if [ "$BUNDLE_EXIT" -ne 0 ]; then
            echo "BUNDLE_VIOLATIONS=true" >> "$GITHUB_ENV"
          fi
          exit 0

      # ------------------------------------------------------------------
      # 3. Post or update a PR comment with the report
      # ------------------------------------------------------------------
      - name: Post bundle size comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const reportPath = '/tmp/bundle-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No bundle report found – skipping comment.');
              return;
            }

            const reportBody = fs.readFileSync(reportPath, 'utf8');
            const MARKER = '<!-- bundle-size-report -->';
            const body = `${MARKER}\n${reportBody}`;

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(MARKER),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # ------------------------------------------------------------------
      # 4. Fail the job if budget violations were detected
      # ------------------------------------------------------------------
      - name: Fail on budget violations
        if: env.BUNDLE_VIOLATIONS == 'true'
        run: |
          echo "❌ Bundle size budget violations detected. See the PR comment for details."
          exit 1
