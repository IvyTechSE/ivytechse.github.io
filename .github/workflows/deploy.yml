name: Deploy to Github Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4  # Required by JamesIves/github-pages-deploy-action for git context
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: out/
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          force: false
          clean-exclude: pr-preview
          folder: out
