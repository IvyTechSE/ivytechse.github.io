name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build site
        uses: ./.github/actions/build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Post Lighthouse results to PR
        if: always()
        uses: actions/github-script@v7
        env:
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
          LIGHTHOUSE_RESULTS: ${{ steps.lighthouse.outputs.assertionResults }}
        with:
          script: |
            const links = JSON.parse(process.env.LIGHTHOUSE_LINKS || '{}');
            const assertionResults = JSON.parse(process.env.LIGHTHOUSE_RESULTS || '[]');

            const categories = {
              'categories:performance':    { emoji: '⚡', label: 'Performance' },
              'categories:accessibility':  { emoji: '♿', label: 'Accessibility' },
              'categories:best-practices': { emoji: '✅', label: 'Best Practices' },
              'categories:seo':            { emoji: '🔍', label: 'SEO' },
            };

            // Keep the worst result per category when multiple URLs are audited
            const worst = {};
            for (const r of assertionResults) {
              if (!worst[r.name] || (!r.passed && worst[r.name].passed)) {
                worst[r.name] = r;
              }
            }

            let allPassed = true;
            let table = '| Category | Score | Threshold | Status |\n|---|---|---|---|\n';
            for (const [key, meta] of Object.entries(categories)) {
              const r = worst[key];
              if (!r) continue;
              const score = Math.round(r.actual * 100);
              const threshold = Math.round(r.expected * 100);
              const status = r.passed ? '✅ Pass' : '❌ Fail';
              if (!r.passed) allPassed = false;
              table += `| ${meta.emoji} **${meta.label}** | ${score} | ≥${threshold} | ${status} |\n`;
            }

            const reportLinks = Object.values(links)
              .map(url => `[📊 View full Lighthouse report](${url})`)
              .join('\n');

            const lighthouseRan = Object.keys(links).length > 0;
            const headline = !lighthouseRan && assertionResults.length === 0
              ? '⚠️ Lighthouse results unavailable.'
              : allPassed
                ? '✅ All Lighthouse budget thresholds passed!'
                : '❌ One or more Lighthouse budget thresholds failed.';

            const body = [
              '## 🔦 Lighthouse CI',
              '',
              headline,
              '',
              ...(assertionResults.length > 0 ? [table] : []),
              ...(reportLinks ? [reportLinks] : []),
            ].join('\n');

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('## 🔦 Lighthouse CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
