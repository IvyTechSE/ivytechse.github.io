name: Preview Cleanup

on:
  pull_request:
    types:
      - closed

permissions:
  pull-requests: write
  contents: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
        continue-on-error: true
      - name: Remove preview directory
        id: cleanup
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_DIR="pr-preview/pr-${PR_NUMBER}"
          
          # Check if we're on the gh-pages branch
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1 && ! git branch --show-current | grep -q gh-pages; then
            echo "gh-pages branch does not exist yet, nothing to clean up"
            echo "cleaned=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ -d "$PREVIEW_DIR" ]; then
            echo "Removing preview directory: $PREVIEW_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PREVIEW_DIR"
            git commit -m "Remove preview for PR #${PR_NUMBER}"
            git push
            echo "cleaned=true" >> $GITHUB_OUTPUT
          else
            echo "Preview directory $PREVIEW_DIR does not exist, nothing to clean up"
            echo "cleaned=false" >> $GITHUB_OUTPUT
          fi
      - name: Comment cleanup
        if: steps.cleanup.outputs.cleaned == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comment = `🧹 Preview for PR #${prNumber} has been cleaned up.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
